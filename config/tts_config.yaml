corpus:
  source: "huggingface"
  dataset_name: "ai4bharat/IndicCorpV2"
  subset: "indiccorp_v2"
  data_dir: "data/hin_Deva"
  split: "train"
  text_column: "text"
  train_output_path: "data/processed/tts_prompts_train.txt"
  eval_output_path: "data/processed/tts_prompts_eval.txt"
  language: "hi"
  max_train_samples: 5000
  max_eval_samples: 200
  min_chars: 20
  max_chars: 220
  max_words: 40

teacher:
  provider: "coqui_fairseq_vits"
  model_name: "tts_models/hin/fairseq/vits"
  device: "auto"
  split_sentences: true

data:
  train_prompts_path: "data/processed/tts_prompts_train.txt"
  eval_prompts_path: "data/processed/tts_prompts_eval.txt"
  teacher_train_audio_dir: "data/processed/tts_teacher_audio/train"
  teacher_eval_audio_dir: "data/processed/tts_teacher_audio/eval"
  student_dataset_dir: "data/processed/tts_student_dataset"
  sample_rate: 22050
  speaker_name: "teacher_voice"

eval:
  prompts_path: "data/processed/tts_prompts_eval.txt"
  teacher_output_path: "reports/tts_teacher_eval.json"
  student_output_path: "reports/tts_student_eval.json"
  asr_model_name: "openai/whisper-medium"

training:
  student_model_name: "vits"
  output_dir: "models/tts_student"
  language: "hindi"
  batch_size: 16
  eval_batch_size: 8
  num_loader_workers: 2
  num_eval_loader_workers: 2
  learning_rate: 2e-4
  warmup_steps: 0
  num_epochs: 200
  eval_split_size: 0.02
  save_step: 1000
  print_step: 25
  mixed_precision: true
  text_cleaner: "basic_cleaners"
  use_phonemes: false
  best_checkpoint_name: "best_model.pth"
