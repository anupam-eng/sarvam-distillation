data:
  train_manifest_path: "data/processed/asr_train.jsonl"
  eval_manifest_path: "data/processed/asr_eval.jsonl"
  teacher_train_dir: "data/processed/tts_teacher_audio/train"
  teacher_eval_dir: "data/processed/tts_teacher_audio/eval"
  additional_train_manifests: []
  sample_rate: 16000

eval:
  manifest_path: "data/processed/asr_eval.jsonl"
  output_path: "reports/asr_student_eval.json"
  backend: "whisper_seq2seq"

training:
  student_model_name: "openai/whisper-medium"
  output_dir: "models/asr_student"
  language: "hindi"
  task: "transcribe"
  learning_rate: 1e-5
  weight_decay: 0.01
  warmup_steps: 500
  batch_size: 2
  gradient_accumulation_steps: 8
  num_train_epochs: 3
  max_steps: -1
  logging_steps: 25
  eval_steps: 250
  save_steps: 250
  generation_max_length: 225
  max_duration_seconds: 30.0
  dataloader_num_workers: 2
  mixed_precision: "fp16"
